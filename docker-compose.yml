# docker-compose standalone del backend
# Asume que alumnos-datos ya esta corriendo en la red compartida alumnos-network
# Para levantar la DB: cd ../alumnos-datos && docker compose up -d
# Para crear la red (solo la primera vez): docker network create alumnos-network
services:

  alumnos-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: alumnos-app:latest
    container_name: alumnos-app
    environment:
      SPRING_PROFILES_ACTIVE:     dev
      SPRING_DATASOURCE_URL:      jdbc:postgresql://alumnos-datos:5432/alumnos
      SPRING_DATASOURCE_USERNAME: alumnos_user
      SPRING_DATASOURCE_PASSWORD: alumnos_pass
    ports:
      - "8080:8080"
    restart: unless-stopped
    networks:
      - alumnos-network

networks:
  alumnos-network:
    external: true
